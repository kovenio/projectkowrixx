<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЭКО-СОРТИРОВКА</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: linear-gradient(135deg, #1b3b4f 0%, #2a5f7a 100%);
            --cream: #fef9e8;
            --green: #3b8c4a;
            --green-dark: #2b6c2b;
            --shadow: 0 8px 0px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            overflow: hidden;
        }
       .btn {
            background-color: rgb(248, 248, 217);
            width: 95px;
            height: 35px;
            border: brown solid 1px;
            border-radius: 20px;
            margin-right: 50px;
            text-align: center;
            text-decoration: none;
            color: black;
            padding-top: 4px;
        }

        .screen {
            display: none;
            width: 90%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 48px;
            padding: 40px;
            border: 2px solid rgba(255,255,255,0.1);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .active { display: block; }

        /* Начальный экран */
        h1 { color: white; font-size: 3rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .subtitle { color: #ade8af; margin-bottom: 30px; font-size: 1.2rem; }
        
        .level-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 40px;
            max-height: 350px;
            overflow-y: auto;
            padding: 10px;
        }

        .level-btn {
            width: 85px;
            height: 85px;
            background: var(--cream);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: 0.1s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .level-btn.selected { background: #ff9f43; color: white; transform: translateY(5px); box-shadow: 0 3px 0 rgba(0,0,0,0.2); }
        .level-btn:active { transform: translateY(8px); box-shadow: none; }
        .level-btn b { font-size: 1.5rem; }
        .level-btn span { font-size: 0.7rem; }

        .main-btn {
            background: var(--green);
            color: white;
            padding: 20px 60px;
            font-size: 1.5rem;
            border-radius: 60px;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 0 var(--green-dark);
            font-weight: bold;
        }
        .main-btn:active { transform: translateY(6px); box-shadow: 0 4px 0 var(--green-dark); }

        /* Игровой экран */
        .game-header { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 15px; }
        .stat { background: var(--cream); padding: 15px; border-radius: 25px; flex: 1; font-weight: bold; box-shadow: inset 0 -4px 0 rgba(0,0,0,0.1); }
        .timer-low { background: #ffcfcf; color: red; animation: blink 0.5s infinite; }

        .bins-row { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .bin {
            width: 100px; padding: 15px 5px; background: white; border-radius: 20px;
            box-shadow: var(--shadow); transition: 0.2s;
        }
        .bin-icon { font-size: 2.5rem; display: block; }
        .bin-label { font-size: 0.7rem; font-weight: 900; text-transform: uppercase; }

        .items-box { background: rgba(0,0,0,0.2); padding: 25px; border-radius: 40px; min-height: 180px; }
        .items-grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }

.waste {
            width: 90px; height: 90px; background: var(--cream); border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: grab; box-shadow: var(--shadow);
        }
        .waste i { font-size: 1.8rem; margin-bottom: 5px; }
        .waste span { font-size: 0.65rem; font-weight: bold; padding: 0 5px; text-align: center; }

        .msg { height: 30px; margin: 15px 0; color: white; font-weight: bold; font-size: 1.1rem; }

        /* Цвета баков */
        .b-org { border-bottom: 8px solid #4CAF50; color: #2e7d32; }
        .b-pla { border-bottom: 8px solid #FF9800; color: #ef6c00; }
        .b-pap { border-bottom: 8px solid #2196F3; color: #1565c0; }
        .b-gla { border-bottom: 8px solid #00BCD4; color: #00838f; }
        .b-met { border-bottom: 8px solid #9E9E9E; color: #424242; }
        .b-ele { border-bottom: 8px solid #9C27B0; color: #6a1b9a; }
        .b-tex { border-bottom: 8px solid #E91E63; color: #ad1457; }
        .b-haz { border-bottom: 8px solid #f44336; color: #c62828; }

        @keyframes blink { 50% { opacity: 0.5; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .shake { animation: shake 0.3s; }
        .vanish { transform: scale(1.5); opacity: 0; transition: 0.3s; pointer-events: none; }
    </style>
</head>
<body>
    <a href="index.html" class="btn">Назад</a>
    <div id="menu-screen" class="screen active">
        <i class="fas fa-recycle" style="font-size: 5rem; color: white; margin-bottom: 20px;"></i>
        <h1>ЭКО-СОРТИРОВКА</h1>
        <div class="subtitle">20 уровней обучения</div>
        <div id="level-grid" class="level-grid"></div>
        <button class="main-btn" onclick="pressStart()">ИГРАТЬ</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="game-header">
            <div class="stat">Уровень: <span id="cur-lvl-txt">1</span>/20</div>
            <div class="stat">Счет: <span id="score-txt">0/0</span></div>
            <div id="timer-box" class="stat">Время: <span id="time-txt">30</span>с</div>
        </div>

        <div id="bins-row" class="bins-row"></div>

        <div class="items-box">
            <div id="items-grid" class="items-grid"></div>
        </div>

        <div id="msg-txt" class="msg">Перетащи отходы в нужный бак!</div>

        <div style="display: flex; gap: 15px; justify-content: center;">
            <button class="main-btn" style="padding: 10px 30px; font-size: 1rem;" onclick="reloadLevel()">Заново</button>
            <button class="main-btn" style="padding: 10px 30px; font-size: 1rem; background: #666; box-shadow: 0 6px 0 #444;" onclick="backToMenu()">Меню</button>
        </div>
    </div>

    <script>
        // Данные
        var BINS = {
            organic: { icon: '🍌', label: 'Органика', cls: 'b-org' },
            plastic: { icon: '🧴', label: 'Пластик', cls: 'b-pla' },
            paper: { icon: '📦', label: 'Бумага', cls: 'b-pap' },
            glass: { icon: '🥛', label: 'Стекло', cls: 'b-gla' },
            metal: { icon: '🔩', label: 'Металл', cls: 'b-met' },
            electronics: { icon: '⚡', label: 'Электро', cls: 'b-ele' },
            textile: { icon: '👕', label: 'Ткань', cls: 'b-tex' },
            hazardous: { icon: '☠️', label: 'Опасно', cls: 'b-haz' }
        };

        var ITEMS = [
            { t: 'organic', i: 'fa-apple-whole', n: 'Огрызок яблока' },
            { t: 'organic', i: 'fa-carrot', n: 'Очистки моркови' },
            { t: 'plastic', i: 'fa-bottle-water', n: 'Пластик. бутылка' },
            { t: 'plastic', i: 'fa-bag-shopping', n: 'Пакет' },
            { t: 'paper', i: 'fa-newspaper', n: 'Старая газета' },
            { t: 'paper', i: 'fa-box', n: 'Картонная коробка' },


            { t: 'glass', i: 'fa-wine-glass', n: 'Стеклянная банка' },
            { t: 'metal', i: 'fa-can-food', n: 'Консервная банка' },
            { t: 'electronics', i: 'fa-battery-half', n: 'Батарейка' },
            { t: 'textile', i: 'fa-shirt', n: 'Старая футболка' },
            { t: 'hazardous', i: 'fa-skull-crossbones', n: 'Растворитель' }
        ];

        var levels = [];
        var selectedLevelIdx = 0;
        var score = 0;
        var timeLeft = 0;
        var timerId = null;

        // Генерация 20 уровней
        for (var i = 0; i < 20; i++) {
            var bKeys = Object.keys(BINS).slice(0, Math.min(3 + Math.floor(i/3), 8));
            var lvlItems = [];
            var count = 3 + Math.floor(i/2); 
            for(var j=0; j<count; j++) {
                var randType = bKeys[Math.floor(Math.random() * bKeys.length)];
                var found = ITEMS.filter(function(x){ return x.t === randType; });
                var template = found[Math.floor(Math.random() * found.length)];
                lvlItems.push({ t: template.t, i: template.i, n: template.n, id: j });
            }
            levels.push({ bins: bKeys, items: lvlItems, time: 30 + (i*5) });
        }

        // Инициализация сетки уровней
        function initMenu() {
            var grid = document.getElementById('level-grid');
            grid.innerHTML = '';
            levels.forEach(function(lvl, idx) {
                var btn = document.createElement('button');
                btn.className = 'level-btn' + (idx === 0 ? ' selected' : '');
                btn.innerHTML = '<b>' + (idx + 1) + '</b><span>' + lvl.items.length + ' шт</span>';
                btn.onclick = function() {
                    var all = document.querySelectorAll('.level-btn');
                    for(var k=0; k<all.length; k++) { all[k].classList.remove('selected'); }
                    btn.classList.add('selected');
                    selectedLevelIdx = idx;
                };
                grid.appendChild(btn);
            });
        }

        function pressStart() {
            document.getElementById('menu-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            loadLevel(selectedLevelIdx);
        }

        function loadLevel(idx) {
            var lvl = levels[idx];
            score = 0;
            timeLeft = lvl.time;
            
            document.getElementById('cur-lvl-txt').innerText = idx + 1;
            document.getElementById('score-txt').innerText = '0/' + lvl.items.length;
            document.getElementById('time-txt').innerText = timeLeft;
            document.getElementById('msg-txt').innerText = 'Сортируй отходы правильно!';
            document.getElementById('timer-box').classList.remove('timer-low');

            // Отрисовка баков
            var bRow = document.getElementById('bins-row');
            bRow.innerHTML = '';
            lvl.bins.forEach(function(bKey) {
                var binData = BINS[bKey];
                var div = document.createElement('div');
                div.className = 'bin ' + binData.cls;
                div.innerHTML = '<span class="bin-icon">' + binData.icon + '</span>' +
                                '<span class="bin-label">' + binData.label + '</span>';
                
                div.ondragover = function(e) { e.preventDefault(); };
                div.ondrop = function(e) { handleDrop(e, bKey, div); };
                bRow.appendChild(div);
            });

            // Отрисовка предметов
            var iGrid = document.getElementById('items-grid');
            iGrid.innerHTML = '';
            lvl.items.forEach(function(it) {
                var div = document.createElement('div');
                div.className = 'waste';


div.draggable = true;
                div.id = 'waste-' + it.id;
                div.innerHTML = '<i class="fas ' + it.i + '"></i><span>' + it.n + '</span>';
                
                div.ondragstart = function(e) {
                    e.dataTransfer.setData('text', it.t + '|' + div.id);
                };
                iGrid.appendChild(div);
            });

            if(timerId) clearInterval(timerId);
            timerId = setInterval(runTimer, 1000);
        }

        function runTimer() {
            timeLeft--;
            document.getElementById('time-txt').innerText = timeLeft;
            if(timeLeft <= 10) document.getElementById('timer-box').classList.add('timer-low');
            if(timeLeft <= 0) {
                clearInterval(timerId);
                document.getElementById('msg-txt').innerText = 'ВРЕМЯ ВЫШЛО!';
                lockItems();
            }
        }

        function handleDrop(e, binType, binEl) {
            var data = e.dataTransfer.getData('text').split('|');
            var itemType = data[0];
            var itemId = data[1];

            if(itemType === binType) {
                score++;
                document.getElementById(itemId).classList.add('vanish');
                document.getElementById('score-txt').innerText = score + '/' + levels[selectedLevelIdx].items.length;
                document.getElementById('msg-txt').innerText = 'Отлично! ✅';
                
                if(score === levels[selectedLevelIdx].items.length) {
                    clearInterval(timerId);
                    document.getElementById('msg-txt').innerText = 'УРОВЕНЬ ПРОЙДЕН! 🎉';
                }
            } else {
                binEl.classList.add('shake');
                document.getElementById('msg-txt').innerText = 'Неверно! ❌';
                setTimeout(function(){ binEl.classList.remove('shake'); }, 300);
            }
        }

        function lockItems() {
            var items = document.querySelectorAll('.waste');
            items.forEach(function(i){ i.draggable = false; });
        }

        function backToMenu() {
            clearInterval(timerId);
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('menu-screen').classList.add('active');
        }

        function reloadLevel() { loadLevel(selectedLevelIdx); }

        initMenu();
    </script>
</body>
</html>
